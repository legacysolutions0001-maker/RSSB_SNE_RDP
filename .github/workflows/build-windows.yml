name: Build Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Patch workspace + package.json for Windows ──────────────────────────
      # pnpm-workspace.yaml was written for Replit Linux:
      #   • overrides exclude all win32 native binaries (esbuild, rollup, etc.)
      #   • minimumReleaseAge blocks packages published < 24 h ago
      # package.json uses pnpm-specific "catalog:" version aliases and
      # "workspace:*" protocol that npm cannot resolve.
      # This step rewrites both files so pnpm can install on Windows.
      - name: Patch workspace for Windows
        shell: node {0}
        run: |
          const fs = require('fs');

          // ── 1. Replace pnpm-workspace.yaml with a clean Windows version ──────
          // The original file was written for Replit Linux:
          //   • overrides block every win32/msvc native binary (needed on Windows)
          //   • minimumReleaseAge + minimumReleaseAgeExclude block cause orphaned
          //     YAML list items when line-filtered, producing a parse error
          // Solution: write a brand-new minimal file with only what Windows needs.
          const cleanWorkspace = `packages:
  - artifacts/*
  - lib/*
  - lib/integrations/*
  - scripts

catalog:
  '@replit/vite-plugin-cartographer': ^0.5.21
  '@replit/vite-plugin-dev-banner': ^0.1.1
  '@replit/vite-plugin-runtime-error-modal': ^0.0.6
  '@tailwindcss/vite': ^4.1.14
  '@tanstack/react-query': ^5.90.21
  '@types/node': ^25.3.3
  '@types/react': ^19.2.0
  '@types/react-dom': ^19.2.0
  '@vitejs/plugin-react': ^5.0.4
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  drizzle-orm: ^0.45.2
  framer-motion: ^12.23.24
  lucide-react: ^0.545.0
  react: 19.1.0
  react-dom: 19.1.0
  tailwind-merge: ^3.3.1
  tailwindcss: ^4.1.14
  tsx: ^4.21.0
  vite: ^7.3.2
  wouter: ^3.3.5
  zod: ^3.25.76

autoInstallPeers: false

onlyBuiltDependencies:
  - '@swc/core'
  - esbuild
  - electron
  - msw
  - unrs-resolver
`;
          fs.writeFileSync('pnpm-workspace.yaml', cleanWorkspace);
          console.log('✓ pnpm-workspace.yaml replaced with clean Windows version');

          // ── 2. Patch artifacts/rssb-ams/package.json ──────────────────────
          // Replace pnpm catalog: aliases with real semver versions
          // (taken from the catalog block in pnpm-workspace.yaml)
          const catalog = {
            '@replit/vite-plugin-cartographer':    '^0.5.21',
            '@replit/vite-plugin-dev-banner':      '^0.1.1',
            '@replit/vite-plugin-runtime-error-modal': '^0.0.6',
            '@tailwindcss/vite':                   '^4.1.14',
            '@tanstack/react-query':               '^5.90.21',
            '@types/node':                         '^25.3.3',
            '@types/react':                        '^19.2.0',
            '@types/react-dom':                    '^19.2.0',
            '@vitejs/plugin-react':                '^5.0.4',
            'class-variance-authority':            '^0.7.1',
            'clsx':                                '^2.1.1',
            'framer-motion':                       '^12.23.24',
            'lucide-react':                        '^0.545.0',
            'react':                               '19.1.0',
            'react-dom':                           '19.1.0',
            'tailwind-merge':                      '^3.3.1',
            'tailwindcss':                         '^4.1.14',
            'vite':                                '^7.3.2',
            'wouter':                              '^3.3.5',
            'zod':                                 '^3.25.76',
          };

          const pkgPath = 'artifacts/rssb-ams/package.json';
          const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));

          // Replace catalog: aliases
          for (const section of ['dependencies', 'devDependencies']) {
            if (!pkg[section]) continue;
            for (const [name, ver] of Object.entries(pkg[section])) {
              if (ver === 'catalog:' && catalog[name]) {
                pkg[section][name] = catalog[name];
              }
            }
          }

          // Remove workspace:* dep (never actually imported in source)
          delete pkg.devDependencies['@workspace/api-client-react'];

          // On Windows, icon embedding works natively — re-enable it
          pkg.build.win.signAndEditExecutable = true;

          fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2));
          console.log('✓ package.json patched');

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Vite production bundle
        working-directory: artifacts/rssb-ams
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Build Windows NSIS installer
        working-directory: artifacts/rssb-ams
        run: pnpm exec electron-builder build --win --x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          CSC_LINK: ""

      - name: List release output
        shell: bash
        run: ls -lh "artifacts/rssb-ams/release/"

      - name: Upload installer as Actions artifact
        uses: actions/upload-artifact@v4
        with:
          name: RSSB-SNE-AMS-Windows-Setup
          path: artifacts/rssb-ams/release/*.exe
          retention-days: 90

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: windows-latest
          name: "RSSB SNE AMS — Windows Installer (Latest)"
          body: |
            ## RSSB SNE Accommodation Management System
            **Auto-built Windows installer — always up to date.**

            ### How to install
            1. Download the `.exe` file below
            2. Run it and click *Next* through the wizard
            3. Launch **RSSB SNE AMS** from the Desktop or Start Menu

            ### Login credentials
            | Field    | Value        |
            |----------|-------------|
            | Username | `bhagwan01`  |
            | Password | `Bhagwan_01` |
          files: artifacts/rssb-ams/release/*.exe
          make_latest: true
          prerelease: false
